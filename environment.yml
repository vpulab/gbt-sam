name: gbt_sam_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # Deep Learning Core 
  - pytorch=1.13.1
  - torchvision=0.14.1
  - torchaudio=0.13.1
  - pytorch-cuda=11.7
  # Medical & Vision Libraries
  - monai=1.1.0
  - nibabel=5.2.1
  - scikit-image=0.20.0
  - scikit-learn=1.2.2
  - scipy=1.10.1
  - pillow=9.4.0
  - matplotlib=3.7.1
  - seaborn=0.13.2
  - timm=0.9.12
  - einops=0.6.1
  # Data processing & Utils
  - numpy=1.24.3
  - pandas=1.5.3
  - tqdm=4.65.0
  - tensorboard=2.11.0
  - tensorboardx=2.2
  # Pip packages 
  - pip:
    - opencv-python==4.7.0.72
    - openpyxl==3.1.5
    - simpleitk==2.3.1
    - thop==0.1.1-2209072238
